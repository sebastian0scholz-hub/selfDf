<!doctype html>
<html>
  <head>
    <title>SRE & Directed Forgetting Experiment</title>
    <meta charset="utf-8">
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1">
    <style>
      body { background-color: #7F7F7F; margin: 0; overflow: hidden; font-family: Arial, sans-serif; width: 100vw; height: 100vh; }
      #form-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #7F7F7F; z-index: 9999; }
      #form-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: #f0f0f0; padding: 30px; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.3); width: 350px; color: #000000; box-sizing: border-box; }
      .form-field { margin-bottom: 15px; }
      .form-field label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
      .form-field input, .form-field select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
      #start-btn { width: 100%; padding: 10px; background-color: #333; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
      #start-btn:hover { background-color: #555; }
      #error-msg { color: red; font-size: 13px; font-weight: bold; margin-bottom: 10px; display: none; }
      #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; justify-content: center; align-items: center; }
      #experiment-canvas { background-color: #7F7F7F; display: block; }
    </style>
  </head>
  <body>
    
    <div id="form-overlay">
      <div id="form-container">
        <h3 style="margin-top: 0; text-align: center;">Gedächtnisstudie</h3>
        <div id="error-msg">Bitte füllen Sie alle Felder aus!</div>
        <div class="form-field"><label>Alter:</label><input type="number" id="input-alter" min="1" max="100"></div>
        <div class="form-field">
          <label>Geschlecht:</label>
          <select id="select-geschlecht">
            <option value="Auswahl">-- Bitte wählen --</option>
            <option value="männlich">männlich</option>
            <option value="weiblich">weiblich</option>
            <option value="divers">divers</option>
          </select>
        </div>
        <div class="form-field"><label>Beruf:</label><input type="text" id="input-beruf"></div>
        <button id="start-btn">Experiment starten</button>
      </div>
    </div>

    <div id="canvas-container">
      <canvas id="experiment-canvas"></canvas>
    </div>

    <script type="module" src="./index.js"></script>
  </body>
</html>
