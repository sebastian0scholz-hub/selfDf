<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GitHub Pages -> Google Forms Test</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 40px; text-align: center; background-color: #f4f4f4;">

    <h2>GitHub zu Google Forms Live-Test</h2>
    <p>Dieser Test simuliert deine Experiment-Daten und sendet sie über eine sichere Iframe-Pipeline von GitHub zu Google Forms.</p>
    
    <button id="send-btn" style="padding: 15px 30px; font-size: 18px; cursor: pointer; background: #E67E22; color: white; border: none; border-radius: 4px; font-weight: bold;">
        🚀 Testdaten von GitHub senden
    </button>

    <p id="status-msg" style="margin-top: 20px; font-weight: bold; color: blue;"></p>

    <script>
        // Deine simulierten CSV-Daten aus dem Experiment
        const simulierteCSV = 
`participant,alter,geschlecht,beruf,section,word,true_type,ref,cue,question,response,correct,rt
"GITHUB_TEST_USER","21","Divers","GitHub-Tester","learning","VERBINDUNG","old","self","MERKEN","","Ja","", "0.32"
"GITHUB_TEST_USER","21","Divers","GitHub-Tester","test","VERBINDUNG","old","self","MERKEN","","old","1", "0.45"`;

        document.getElementById('send-btn').addEventListener('click', () => {
            const status = document.getElementById('status-msg');
            status.style.color = "blue";
            status.innerText = "Sende Daten über GitHub-Pipeline... Bitte 2 Sekunden warten.";

            // 1. Die offizielle Google-Antwort-Adresse deines Formulars
            const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSeZ1NznFFpSuDPR_aZvufLztVFyFKy2DRIAQPgAux3tAevi1Q/formResponse";
            
            // 2. Wir verpacken die CSV-Daten direkt als URL-Parameter
            const targetUrl = `${formUrl}?entry.1396409330=${encodeURIComponent(simulierteCSV)}`;

            // 3. Wir erstellen ein unsichtbares Iframe-Element im Hintergrund
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = targetUrl;
            
            // 4. Das Iframe in die Seite einfügen (löst das Senden an Google aus)
            document.body.appendChild(iframe);
            
            // 5. Nach einer kurzen Verzögerung das Iframe wieder aufräumen
            setTimeout(() => {
                document.body.removeChild(iframe);
                status.style.color = "green";
                status.innerText = "✅ Abgeschickt! Schließe diesen Tab, öffne dein Google Formular und prüfe das Tab 'Antworten'.";
                console.log("Erfolgreich via Iframe-Pipeline übermittelt.");
            }, 2000);
        });
    </script>
</body>
</html>
